<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adiyogi – The First Yogi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* (Same background and container styles as before, with minor adjustments) */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0b0a0f;
            background-image: radial-gradient(circle at 20% 30%, #2a2536 0%, #0f0c14 90%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            color: #e8e2d9;
            position: relative;
            overflow-x: hidden;
        }

        /* Sacred geometry background */
        .mandala {
            position: absolute;
            width: 800px;
            height: 800px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(180, 140, 100, 0.05) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
            pointer-events: none;
        }

        .mandala::after {
            content: "";
            position: absolute;
            top: 10%;
            left: 10%;
            width: 80%;
            height: 80%;
            border: 1px solid rgba(200, 160, 120, 0.1);
            border-radius: 50%;
        }

        .particle {
            position: absolute;
            background: rgba(230, 180, 120, 0.3);
            border-radius: 50%;
            filter: blur(8px);
            animation: float 20s infinite alternate;
        }

        .particle1 { width: 200px; height: 200px; top: 10%; left: 5%; }
        .particle2 { width: 300px; height: 300px; bottom: 5%; right: 5%; background: rgba(140, 100, 180, 0.2); animation-duration: 25s; }
        .particle3 { width: 150px; height: 150px; top: 60%; left: 80%; background: rgba(210, 150, 80, 0.2); }

        @keyframes float {
            0% { transform: translateY(0) scale(1); opacity: 0.3; }
            100% { transform: translateY(-40px) scale(1.2); opacity: 0.5; }
        }

        /* Main container */
        .adiyogi-container {
            position: relative;
            z-index: 10;
            max-width: 1200px;
            width: 100%;
            background: rgba(18, 15, 25, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(230, 190, 140, 0.15);
            border-radius: 48px;
            padding: 2.5rem;
            box-shadow: 0 30px 60px -20px #000000, 0 0 0 1px rgba(230, 180, 120, 0.1) inset;
            display: flex;
            flex-direction: column;
            gap: 2.5rem;
        }

        /* ----- Adiyogi Character Avatar (CSS Art) ----- */
        .character-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .adiyogi-avatar {
            width: 220px;
            height: 220px;
            background: linear-gradient(145deg, #2b221c, #1e1713);
            border-radius: 50% 50% 40% 40%;
            position: relative;
            margin-bottom: 1.2rem;
            border: 4px solid #b58d5b;
            box-shadow: 0 20px 40px -10px #000000, 0 0 60px #b58d5b66;
            transition: all 0.3s ease;
            cursor: default;
            overflow: hidden;
        }

        .adiyogi-avatar:hover {
            transform: scale(1.02);
            box-shadow: 0 25px 50px -5px #000000, 0 0 80px #c9a36b;
        }

        /* Face (circle) */
        .face {
            position: absolute;
            width: 100px;
            height: 100px;
            background: #d9b382;
            background: radial-gradient(circle at 30% 30%, #f3d5b5, #b3855a);
            border-radius: 50%;
            top: 50px;
            left: 60px;
            box-shadow: inset -5px -5px 10px rgba(0,0,0,0.2);
        }

        /* Matted hair (jata) – multiple strands */
        .hair {
            position: absolute;
            top: 10px;
            left: 40px;
            width: 140px;
            height: 80px;
        }

        .strand {
            position: absolute;
            width: 20px;
            height: 60px;
            background: #3a2e24;
            border-radius: 40% 40% 20% 20%;
            transform-origin: top center;
            box-shadow: 2px 5px 5px rgba(0,0,0,0.3);
        }

        .strand1 { left: 20px; transform: rotate(-15deg); height: 70px; }
        .strand2 { left: 40px; transform: rotate(-5deg); }
        .strand3 { left: 60px; transform: rotate(0deg); height: 75px; }
        .strand4 { left: 80px; transform: rotate(5deg); }
        .strand5 { left: 100px; transform: rotate(15deg); height: 70px; }

        /* Additional loose strands */
        .strand6 { left: 0px; top: 10px; transform: rotate(-25deg); height: 50px; width: 15px; background: #4d3e30; }
        .strand7 { left: 120px; top: 10px; transform: rotate(25deg); height: 50px; width: 15px; background: #4d3e30; }

        /* Tilak on forehead */
        .tilak {
            position: absolute;
            top: 90px;
            left: 100px;
            width: 16px;
            height: 16px;
            background: #c96b2e;
            border-radius: 50% 50% 50% 0;
            transform: rotate(45deg);
            box-shadow: 0 0 10px #ffaa33;
        }

        /* Eyes (closed in meditation) */
        .eye {
            position: absolute;
            width: 18px;
            height: 6px;
            background: #2e1e12;
            border-radius: 40%;
            top: 80px;
        }

        .eye-left { left: 80px; transform: rotate(-5deg); }
        .eye-right { left: 120px; transform: rotate(5deg); }

        /* Nose */
        .nose {
            position: absolute;
            width: 8px;
            height: 14px;
            background: #b3855a;
            border-radius: 40%;
            top: 96px;
            left: 106px;
            box-shadow: inset -1px -2px 3px #6b4d33;
        }

        /* Beard / chin shadow (optional) */
        .beard {
            position: absolute;
            width: 60px;
            height: 20px;
            background: #b3855a;
            top: 112px;
            left: 80px;
            border-radius: 0 0 40% 40%;
            filter: brightness(0.8);
        }

        /* Body (lotus pose – simplified) */
        .body {
            position: absolute;
            width: 140px;
            height: 70px;
            background: #4f3b28;
            bottom: 20px;
            left: 40px;
            border-radius: 50% 50% 20% 20%;
            box-shadow: inset 0 -10px 10px #2f241b;
        }

        /* Legs crossed (simplified) */
        .leg {
            position: absolute;
            width: 50px;
            height: 40px;
            background: #4f3b28;
            bottom: -5px;
            border-radius: 40% 40% 20% 20%;
        }

        .leg-left { left: 50px; transform: rotate(10deg); }
        .leg-right { left: 90px; transform: rotate(-10deg); }

        /* A glowing aura behind the avatar */
        .aura {
            position: absolute;
            top: -20px;
            left: -20px;
            width: 260px;
            height: 260px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,200,100,0.3) 0%, transparent 70%);
            z-index: -1;
            filter: blur(15px);
            animation: auraPulse 5s infinite alternate;
        }

        @keyframes auraPulse {
            0% { opacity: 0.5; transform: scale(1); }
            100% { opacity: 0.9; transform: scale(1.1); }
        }

        .character-name {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #f5e6d3, #dbbd9a);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 5px rgba(0,0,0,0.3);
            margin-bottom: 0.25rem;
            position: relative;
        }

        .character-title {
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #bda37e;
            font-weight: 300;
        }

        .quote-badge {
            margin-top: 1rem;
            background: rgba(180, 140, 100, 0.15);
            padding: 0.6rem 1.5rem;
            border-radius: 40px;
            font-size: 0.95rem;
            color: #ecd8b4;
            border: 1px solid #b58d5b44;
            backdrop-filter: blur(4px);
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        /* Chat section (unchanged from previous) */
        .chat-section {
            background: rgba(10, 8, 15, 0.6);
            border-radius: 36px;
            padding: 1.8rem;
            border: 1px solid rgba(230, 180, 120, 0.15);
            backdrop-filter: blur(5px);
        }

        .chat-messages {
            height: 300px;
            overflow-y: auto;
            padding-right: 0.5rem;
            margin-bottom: 1.8rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            scroll-behavior: smooth;
        }

        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: #b58d5b;
            border-radius: 10px;
        }

        .message {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            max-width: 80%;
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            background: #3d3529;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            border: 1px solid #b58d5b;
            flex-shrink: 0;
        }

        .message.user .message-avatar {
            background: #5b4b38;
        }

        .message-bubble {
            background: rgba(30, 25, 40, 0.8);
            padding: 12px 18px;
            border-radius: 24px 24px 24px 8px;
            border: 1px solid rgba(200, 160, 120, 0.3);
            color: #efebdd;
            font-size: 0.95rem;
            line-height: 1.5;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            backdrop-filter: blur(5px);
        }

        .message.user .message-bubble {
            background: rgba(70, 50, 35, 0.8);
            border-radius: 24px 24px 8px 24px;
            border-color: #b58d5b;
        }

        .welcome-message .message-bubble {
            background: rgba(45, 35, 25, 0.8);
            font-style: italic;
            border-left: 3px solid #c9a36b;
        }

        .chat-input-area {
            display: flex;
            gap: 12px;
            align-items: center;
            background: rgba(0,0,0,0.3);
            border-radius: 60px;
            padding: 0.5rem 0.5rem 0.5rem 1.5rem;
            border: 1px solid #b58d5b33;
        }

        .chat-input-area input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 0.9rem 0;
            font-size: 1rem;
            color: #f0e9e0;
            outline: none;
            font-family: 'Inter', sans-serif;
        }

        .chat-input-area input::placeholder {
            color: #9b8b78;
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        .chat-input-area button {
            background: linear-gradient(145deg, #b58d5b, #8f6b42);
            border: none;
            color: #0f0c14;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid #ecd8b4;
            box-shadow: 0 4px 10px #00000055;
        }

        .chat-input-area button:hover {
            background: #dbbd9a;
            transform: scale(1.05);
            color: #1a151f;
        }

        .chat-input-area button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .loading {
            display: flex;
            justify-content: center;
            gap: 6px;
            padding: 1rem;
            color: #bda37e;
        }

        .loading-dot {
            width: 8px;
            height: 8px;
            background: #b58d5b;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .loading-dot:nth-child(1) { animation-delay: -0.32s; }
        .loading-dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        .footer-note {
            text-align: center;
            font-size: 0.8rem;
            color: #6b5f4f;
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="mandala"></div>
    <div class="particle particle1"></div>
    <div class="particle particle2"></div>
    <div class="particle particle3"></div>

    <main class="adiyogi-container">
        <!-- Character Area with CSS Art Avatar -->
        <div class="character-area">
            <div class="adiyogi-avatar">
                <!-- Aura behind -->
                <div class="aura"></div>
                <!-- Hair strands -->
                <div class="hair">
                    <div class="strand strand1"></div>
                    <div class="strand strand2"></div>
                    <div class="strand strand3"></div>
                    <div class="strand strand4"></div>
                    <div class="strand strand5"></div>
                    <div class="strand strand6"></div>
                    <div class="strand strand7"></div>
                </div>
                <!-- Face -->
                <div class="face"></div>
                <!-- Tilak -->
                <div class="tilak"></div>
                <!-- Eyes -->
                <div class="eye eye-left"></div>
                <div class="eye eye-right"></div>
                <!-- Nose -->
                <div class="nose"></div>
                <!-- Beard (subtle) -->
                <div class="beard"></div>
                <!-- Body -->
                <div class="body"></div>
                <!-- Legs -->
                <div class="leg leg-left"></div>
                <div class="leg leg-right"></div>
            </div>
            <h1 class="character-name">Adiyogi</h1>
            <div class="character-title">The First Yogi</div>
            <div class="quote-badge">
                <i class="fas fa-quote-left"></i>
                <span>That which is within you, is around you.</span>
                <i class="fas fa-quote-right"></i>
            </div>
        </div>

        <!-- Chat Interface (same as before) -->
        <div class="chat-section">
            <div class="chat-messages" id="chatMessages">
                <div class="message welcome-message">
                    <div class="message-avatar"><i class="fas fa-om"></i></div>
                    <div class="message-bubble">
                        Seek what you seek, and you shall find... Ask me anything, seeker.
                    </div>
                </div>
            </div>

            <div class="chat-input-area">
                <input type="text" id="userInput" placeholder="Speak your mind..." autocomplete="off">
                <button id="sendBtn"><i class="fas fa-paper-plane"></i></button>
            </div>
            <div class="loading" id="loading" style="display: none;">
                <div class="loading-dot"></div>
                <div class="loading-dot"></div>
                <div class="loading-dot"></div>
            </div>
            <div class="footer-note">
                <i class="fas fa-feather-alt"></i> Adiyogi awaits your questions
            </div>
        </div>
    </main>

    <!-- JavaScript (simulated responses, same as before) -->
    <script>
        const chatMessages = document.getElementById('chatMessages');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const loading = document.getElementById('loading');

        function addMessage(sender, text) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;

            const avatarDiv = document.createElement('div');
            avatarDiv.className = 'message-avatar';
            avatarDiv.innerHTML = sender === 'user' ? '<i class="fas fa-user"></i>' : '<i class="fas fa-om"></i>';

            const bubbleDiv = document.createElement('div');
            bubbleDiv.className = 'message-bubble';
            bubbleDiv.textContent = text;

            if (sender === 'user') {
                messageDiv.appendChild(bubbleDiv);
                messageDiv.appendChild(avatarDiv);
            } else {
                messageDiv.appendChild(avatarDiv);
                messageDiv.appendChild(bubbleDiv);
            }

            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function simulateAdiyogiResponse(userMessage) {
            const responses = [
                "The cosmos dances within you, seeker.",
                "Observe the silence between your thoughts.",
                "Stillness is the ultimate language.",
                "Your question is the answer in disguise.",
                "Breathe, and the universe breathes with you.",
                "The mountain does not seek to be tall; it simply is.",
                "Adiyogi knows all paths lead to the same peak.",
                "Let your awareness be your guide."
            ];
            return responses[Math.floor(Math.random() * responses.length)];
        }

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            userInput.disabled = true;
            sendBtn.disabled = true;
            loading.style.display = 'flex';

            addMessage('user', message);
            userInput.value = '';

            // Simulate network delay (replace with actual fetch later)
            setTimeout(() => {
                const reply = simulateAdiyogiResponse(message);
                addMessage('adiyogi', reply);
                userInput.disabled = false;
                sendBtn.disabled = false;
                loading.style.display = 'none';
                userInput.focus();
            }, 1500);
        }

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        userInput.focus();
    </script>
</body>
</html>
